name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m mypy src
      - run: python -m pytest -q --cov=src --cov-report=xml --cov-fail-under=80
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-and-build
          path: |
            coverage.xml
            dist/

