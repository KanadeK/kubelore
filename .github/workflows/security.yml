name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install 'pip-audit==2.9.0'
      - run: python -m pip install .
      - run: pip-audit
      - run: python scripts/secret_scan.py

